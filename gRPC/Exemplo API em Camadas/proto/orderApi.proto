syntax = "proto3";

package orderPackage;

// Contrato gRPC do exemplo de pedidos em camadas.
service OrderApi {
  rpc CreateOrder (CreateOrderRequest) returns (OrderResponse);
  rpc GetOrder (GetOrderRequest) returns (OrderResponse);
  rpc ListOrdersByCustomer (ListOrdersByCustomerRequest) returns (OrdersListResponse);
  rpc UpdateOrderStatus (UpdateOrderStatusRequest) returns (OrderResponse);
}

message CreateOrderRequest {
  string customer_id = 1;
  string customer_name = 2;
  string payment_method = 3;
  repeated CreateOrderItemRequest items = 4;
}

message CreateOrderItemRequest {
  string product_id = 1;
  int32 quantity = 2;
}

message GetOrderRequest {
  int32 order_id = 1;
}

message ListOrdersByCustomerRequest {
  string customer_id = 1;
}

message UpdateOrderStatusRequest {
  int32 order_id = 1;
  string status = 2;
}

message OrderResponse {
  int32 order_id = 1;
  string customer_id = 2;
  string customer_name = 3;
  string status = 4;
  string payment_method = 5;
  double total_amount = 6;
  repeated OrderItemResponse items = 7;
}

message OrderItemResponse {
  string product_id = 1;
  string product_name = 2;
  int32 quantity = 3;
  double unit_price = 4;
  double line_total = 5;
}

message OrdersListResponse {
  repeated OrderResponse orders = 1;
}
