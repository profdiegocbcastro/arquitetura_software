worker_processes auto;

events {
  worker_connections 1024;
}

rtmp {
  server {
    listen 1935;
    chunk_size 4096;

    application live {
      live on;
      record off;
    }
  }
}

http {
  server {
    listen 8080;

    location / {
      default_type text/plain;
      return 200 "RTMP ingest online\n";
    }
  }
}
