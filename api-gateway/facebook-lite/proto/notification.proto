syntax = "proto3";

package notification;

service NotificationService {
  rpc CreateNotification(CreateNotificationRequest) returns (Notification);
  rpc ListNotificationsByUser(ListNotificationsByUserRequest) returns (ListNotificationsByUserResponse);
}

message CreateNotificationRequest {
  string user_id = 1;
  string title = 2;
  string content = 3;
}

message ListNotificationsByUserRequest {
  string user_id = 1;
}

message Notification {
  string id = 1;
  string user_id = 2;
  string title = 3;
  string content = 4;
  string created_at = 5;
}

message ListNotificationsByUserResponse {
  repeated Notification notifications = 1;
}
