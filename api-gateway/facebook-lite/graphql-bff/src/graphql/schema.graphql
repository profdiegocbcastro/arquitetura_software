type ServiceInfo {
  instanceName: String!
  architecture: String!
}

type ChatMessage {
  id: ID!
  fromUserId: ID!
  toUserId: ID!
  content: String!
  sentAt: String!
}

type Notification {
  id: ID!
  userId: ID!
  title: String!
  content: String!
  createdAt: String!
}

type DeliveryResult {
  bffInstance: String!
  message: ChatMessage!
  notification: Notification!
}

type Query {
  serviceInfo: ServiceInfo!
  chatMessagesByUser(userId: ID!): [ChatMessage!]!
  notificationsByUser(userId: ID!): [Notification!]!
}

type Mutation {
  sendMessageAndNotify(fromUserId: ID!, toUserId: ID!, content: String!): DeliveryResult!
}
